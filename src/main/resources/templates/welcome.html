
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Welcome - Online Voting System (India)</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        /* ===== Government Header ===== */
        .gov-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: linear-gradient(90deg, #ff9933, #ffffff, #138808);
            color: #222;
            padding: 12px 20px;
            border-bottom: 3px solid #0041a3;
        }

        .gov-header img {
            height: 50px;
        }

        .gov-header h1 {
            font-size: 1.6rem;
            font-weight: bold;
            margin: 0;
            color: #000;
        }

        .gov-header p {
            font-size: 0.9rem;
            margin: 0;
            color: #333;
        }

        /* ===== Hero Section ===== */
        .hero {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 90vh;
            color: #fff;
            text-align: center;
            padding: 40px 20px;
            overflow: hidden;
        }

        /* Tricolor + flag background */
        .hero::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                linear-gradient(to bottom,
                    rgba(255,153,51,0.85),
                    rgba(255,255,255,0.85),
                    rgba(19,136,8,0.85)
                ),
                url('https://img.freepik.com/free-vector/india-flag-colors-wave-background_1017-38259.jpg')
                no-repeat center center / cover;
            z-index: -1;
        }

        .hero h1 {
            font-size: 2.8rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #222;
        }

        .hero p {
            font-size: 1.3rem;
            margin-bottom: 40px;
            color: #333;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .buttons a {
            padding: 14px 32px;
            background: #0041a3;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
        }

        .buttons a:hover {
            background: #0066ff;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

<!-- ===== Government Header ===== -->
<header class="gov-header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/17/Ashoka_Chakra.svg" alt="Ashoka Chakra">
    <div>
        <h1>Government of India</h1>
        <p>Online Blockchain-Based Voting System</p>
    </div>
</header>

<!-- ===== Navbar Fragment ===== -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- ===== Hero Section ===== -->
<section class="hero">
    <h1>Welcome to the Online Voting System</h1>
    <p>Empowered by Blockchain • Transparent • Secure</p>
    <div class="buttons">
        <a th:href="@{/voter/register}">Register as Voter</a>
        <a th:href="@{/voter/login}">Voter Login</a>
        <a th:href="@{/admin/login}">Admin Login</a>
    </div>
</section>

<!-- ===== Footer Fragment ===== -->
<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
