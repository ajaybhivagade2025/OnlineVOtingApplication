
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Voter Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .dashboard {
            padding: 30px;
            max-width: 900px;
            margin: auto;
        }
        .dashboard h2 { text-align: center; margin-bottom: 20px; }
        .candidates {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .card h3 { margin: 10px 0 5px; }
        .card p { color: #555; margin-bottom: 10px; }
        .card button {
            padding: 10px 20px;
            background: linear-gradient(90deg,#0066ff,#0041a3);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .card button:hover { background: linear-gradient(90deg,#0041a3,#002d73); }
        .success-msg {
            margin: 20px auto;
            padding: 15px;
            background: #e8f7e8;
            color: #156615;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="dashboard">
    <h2>Welcome, <span th:text="${voter.name}">Voter</span></h2>

    <!-- Show success message if vote already cast -->
    <div th:if="${voter.hasVoted}" class="success-msg">
        ✅ You have already cast your vote. Thank you!
    </div>

    <!-- Candidate list -->
    <div th:if="${!voter.hasVoted}" class="candidates">
        <div class="card" th:each="c : ${candidates}">
            <img th:src="@{/images/default-candidate.png}" alt="Candidate Photo">
            <h3 th:text="${c.name}">Candidate Name</h3>
            <p th:text="'Party: ' + ${c.party}">Party</p>
            <form th:action="@{/vote}" method="post">
                <input type="hidden" name="candidateId" th:value="${c.id}">
                <button type="submit">Vote</button>
            </form>
        </div>
    </div>
</div>

<div th:replace="fragments/footer :: footer"></div>
</body>
</html>
