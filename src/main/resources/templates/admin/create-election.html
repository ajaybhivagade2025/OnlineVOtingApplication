<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Election</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.97);
            padding: 35px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            max-width: 500px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 25px;
            font-weight: 700;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }

        input[type="text"], input[type="datetime-local"] {
            width: 100%;
            padding: 12px 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus, input[type="datetime-local"]:focus {
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0,123,255,0.3);
            outline: none;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #fff;
            margin-right: 10px;
        }

        .btn-create { background-color: #2ecc71; }
        .btn-create:hover { background-color: #27ae60; transform: translateY(-2px); }

        .btn-back { background-color: #e74c3c; }
        .btn-back:hover { background-color: #c0392b; transform: translateY(-2px); }

        .btn-list { background-color: #3498db; text-decoration: none; display: inline-block; }
        .btn-list:hover { background-color: #2980b9; transform: translateY(-2px); }

        .btn-dashboard { background-color: #6c5ce7; }
        .btn-dashboard:hover { background-color: #341f97; transform: translateY(-2px); }

        .message {
            text-align: center;
            margin-bottom: 20px;
            color: green;
            font-weight: 600;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .container {
                padding: 25px 20px;
            }
            .btn { margin-bottom: 10px; width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Create New Election</h1>

    <!-- Success/Error message -->
    <div th:if="${message}" class="message" th:text="${message}"></div>

    <form th:action="@{/admin/election/create}" th:object="${election}" method="post">
        <label for="name">Election Name:</label>
        <input type="text" id="name" th:field="*{name}" placeholder="Enter election name" required>

        <label for="startTime">Start Time:</label>
        <input type="datetime-local" id="startTime" th:field="*{startTime}" required>

        <label for="endTime">End Time:</label>
        <input type="datetime-local" id="endTime" th:field="*{endTime}" required>

        <div style="text-align:center; margin-top: 20px;">
            <button type="submit" class="btn btn-create">Create Election</button>
            <button type="button" onclick="history.back();" class="btn btn-back">Back</button>
            <a th:href="@{/admin/elections}" class="btn btn-list">Go to List</a>
            <a th:href="@{/admin/dashboard}" class="btn btn-dashboard">Back to Dashboard</a>
        </div>
    </form>
</div>
</body>
</html>
