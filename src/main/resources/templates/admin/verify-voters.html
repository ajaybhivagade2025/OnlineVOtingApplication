<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{fragments/admin-layout}">
<head>
    <title>Verify Voters</title>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .container {
            background-color: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 15px;
            margin-top: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        h2 {
            text-align: center;
            color: #1a73e8;
            margin-bottom: 25px;
        }

        /* 🔥 Table Improvement */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 14px;
            text-align: center;
        }

        th {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            font-size: 0.95rem;
        }

        tbody tr:nth-child(even) {
            background-color: #e3f2fd;
        }

        tbody tr:nth-child(odd) {
            background-color: #bbdefb;
        }

        tbody tr:hover {
            background-color: #90caf9;
            transform: scale(1.01);
            transition: 0.2s;
        }

        /* 🔥 Buttons */
        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            margin: 2px;
        }

        .btn-success {
            background-color: #28a745;
            color: white;
        }

        .btn-success:hover {
            background-color: #218838;
        }

        .btn-danger {
            background-color: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background-color: #b02a37;
        }

        .btn-secondary {
            background-color: #6c757d;
            color: white;
            padding: 10px 20px;
        }

        .btn-secondary:hover {
            background-color: #545b62;
        }

        /* ✅ FIX spacing */
        .footer-btn {
            text-align: center;
            margin-top: 30px;
        }

        /* Empty state */
        .no-data {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            color: #555;
        }

    </style>
</head>

<body>
<div layout:fragment="content" class="container">

    <h2>Pending Voter Verifications</h2>

    <!-- Table -->
    <table th:if="${pendingVoters != null and !pendingVoters.isEmpty()}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="v : ${pendingVoters}">
            <td th:text="${v.id}">1</td>
            <td th:text="${v.name}">Voter Name</td>
            <td th:text="${v.email}">voter@example.com</td>
            <td>

                <form th:action="@{/admin/verify-voters/{id}/approve(id=${v.id})}"
                      method="post" style="display:inline;">
                    <button type="submit" class="btn btn-success">Approve</button>
                </form>

                <form th:action="@{/admin/verify-voters/{id}/reject(id=${v.id})}"
                      method="post" style="display:inline;"
                      onsubmit="return confirm('Are you sure to reject this voter?');">
                    <button type="submit" class="btn btn-danger">Reject</button>
                </form>

            </td>
        </tr>
        </tbody>
    </table>

    <!-- Empty Case -->
    <div th:if="${pendingVoters == null or pendingVoters.isEmpty()}" class="no-data">
        No pending voters to verify.
    </div>

    <!-- ✅ Fixed Button Position -->
    <div class="footer-btn">
        <a th:href="@{/admin/dashboard}" class="btn btn-secondary">Back to Dashboard</a>
    </div>

</div>
</body>
</html>
