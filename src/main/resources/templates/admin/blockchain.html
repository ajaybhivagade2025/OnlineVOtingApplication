<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Blockchain Status</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<h1>Blockchain Status</h1>

<p th:text="'Is blockchain valid? ' + ${isValid}"></p>

<h2>All Blocks</h2>
<table border="1">
    <tr>
        <th>ID</th>
        <th>Previous Hash</th>
        <th>Current Hash</th>
        <th>Data</th>
        <th>Timestamp</th>
    </tr>
    <tr th:each="block : ${blocks}">
        <td th:text="${block.id}"></td>
        <td th:text="${block.previousHash}"></td>
        <td th:text="${block.currentHash}"></td>
        <td th:text="${block.data}"></td>
        <td th:text="${block.timestamp}"></td>
    </tr>
</table>

<a th:href="@{/admin/dashboard}">Back to Dashboard</a>

</body>
</html>
