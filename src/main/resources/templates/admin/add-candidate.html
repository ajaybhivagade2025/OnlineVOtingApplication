<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.w3.org/1999/xhtml"
      layout:decorate="~{fragments/admin-layout}">
<head>
    <title>Add Candidate</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .container {
            background-color: rgba(255, 255, 255, 0.97);
            max-width: 550px;
            margin: 80px auto;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h2 {
            text-align: center;
            color: #222;
            margin-bottom: 30px;
            font-weight: 700;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }

        input[type="text"], select {
            width: 100%;
            padding: 12px 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus, select:focus {
            border-color: #007bff;
            box-shadow: 0 0 8px rgba(0,123,255,0.3);
            outline: none;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: #007bff;
            color: #fff;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: #6c757d;
            color: #fff;
            margin-left: 10px;
        }

        .btn-secondary:hover {
            background-color: #545b62;
            transform: translateY(-2px);
        }

        .message {
            text-align: center;
            margin-bottom: 25px;
            color: green;
            font-weight: 600;
            font-size: 1.05em;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                margin: 40px 15px;
                padding: 25px;
            }
        }
    </style>
</head>
<body>
<div layout:fragment="content" class="container">
    <h2>Add New Candidate</h2>

    <!-- Flash Success Message -->
    <div th:if="${successMessage}" class="message" th:text="${successMessage}"></div>

    <!-- Candidate Form -->
<!--    <form th:action="@{/admin/add-candidate}" th:object="${candidate}" method="post">-->
<!--    <form th:action="@{/admin/add-candidate}" method="post" enctype="multipart/form-data">-->
    <form th:action="@{/admin/add-candidate}"
          th:object="${candidate}"
          method="post"
          enctype="multipart/form-data">
    <label for="name">Candidate Name</label>
        <input type="text" id="name" th:field="*{name}" placeholder="Enter candidate name" required />

        <label for="party">Party Name</label>
        <input type="text" id="party" th:field="*{party}" placeholder="Enter party name" required />

        <label for="election">Election</label>
        <select id="election" th:field="*{election}" required>
            <option value="" disabled selected>Select Election</option>
            <option th:each="election : ${elections}" th:value="${election.id}" th:text="${election.name}"></option>
        </select>

        <label>Candidate Logo:</label>
        <input type="file" name="logoFile" accept="image/*" required>
        <img th:src="@{'/uploads/' + ${candidate.logo}}" width="60" height="60">

        <div style="text-align:center; margin-top: 20px;">
            <button type="submit" class="btn btn-primary">Add Candidate</button>
            <a th:href="@{/admin/candidates}" class="btn btn-secondary">Cancel</a>
        </div>

        <div style="text-align:center; margin-top: 15px;">
            <a href="/admin/dashboard" class="btn btn-secondary ms-2">Back to Dashboard</a>
            <a href="/admin/candidates" class="btn btn-secondary ms-2">List of Candidates</a>
        </div>
    </form>
</div>
</body>
</html>
