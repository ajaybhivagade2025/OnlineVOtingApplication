<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Candidate - Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(135deg, #ff9933, #ffffff, #138808);
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }
        .form-container {
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            color: #0041a3;
            margin-bottom: 20px;
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ff9933, #138808);
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: linear-gradient(90deg, #e07b00, #0f6606);
        }

        .alert {
            padding: 10px;
            border-radius: 8px;
            background-color: #e6ffe6;
            border: 1px solid #00cc66;
            margin-bottom: 15px;
            color: green;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Add Candidate</h2>

    <!-- ✅ Success Message -->
    <div th:if="${successMessage}" class="alert">
        <p th:text="${successMessage}"></p>
    </div>

    <!-- ✅ Candidate Form -->
    <form th:action="@{/admin/add-candidate}" th:object="${candidate}" method="post">
        <label>Name:</label>
        <input type="text" th:field="*{name}" required>

        <label>Party:</label>
        <input type="text" th:field="*{party}" required>

        <button type="submit">Save Candidate</button>
    </form>
</div>

</body>
</html>
