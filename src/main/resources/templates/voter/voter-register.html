

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Voter Registration</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(120deg, #ff9933, #ffffff, #138808);
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 50px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        h2 {
            text-align: center;
            color: #0041a3;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin: 12px 0 6px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0041a3;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #0066ff;
        }
        .message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Voter Registration</h2>

    <!-- Success message -->
    <div th:if="${success}" class="message success" th:text="${success}"></div>

    <!-- Error message -->
    <div th:if="${error}" class="message error" th:text="${error}"></div>

    <form th:action="@{/voter/register}" th:object="${voter}" method="post">
        <label>National ID:</label>
        <input type="text" th:field="*{username}" placeholder="Enter National ID" required>

        <label>Name:</label>
        <input type="text" th:field="*{name}" placeholder="Enter Full Name" required>

        <label>Email:</label>
        <input type="email" th:field="*{email}" placeholder="Enter Email" required>

        <label>Password:</label>
        <input type="password" th:field="*{password}" placeholder="Enter Password" required>

        <button type="submit">Register</button>
    </form>
</div>

</body>
</html>
