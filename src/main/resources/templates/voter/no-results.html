<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Results Not Available</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f9f9f9; text-align:center; padding:50px; }
        .box { background:white; padding:30px; border-radius:10px; box-shadow:0 4px 8px rgba(0,0,0,0.1); display:inline-block; }
        h1 { color:#d9534f; }
        p { color:#555; margin-top:10px; }
        a { display:inline-block; margin-top:20px; padding:10px 20px; background:#007bff; color:white;
            text-decoration:none; border-radius:6px; }
        a:hover { background:#0056b3; }
    </style>
</head>
<body>
<div class="box">
    <h1>⏳ Results Not Available</h1>
    <p th:text="${message1}">No elections available at the moment</p>
    <p th:text="${message2}">Results will be available after voting ends by the admin</p>
    <a th:href="@{/voter/dashboard}">Back to Home</a>
</div>
</body>
</html>
