<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${election != null} ? 'Election Results - ' + election.name : 'Election Results'">Election Results</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(to right, #f4f7fb, #dfe9f3);
        }

        .container {
            background-color: white;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            margin-top: 50px;
            margin-bottom: 50px;
        }

        h2 {
            color: #0041a3;
            margin-bottom: 30px;
        }

        .alert {
            font-weight: bold;
        }

        table {
            border-radius: 8px;
            overflow: hidden;
        }

        table th {
            background-color: #0041a3 !important;
            color: white !important;
            text-align: center;
        }

        table td {
            text-align: center;
        }

        table tbody tr:hover {
            background-color: rgba(0, 65, 163, 0.1);
        }

        .winner-badge {
            background-color: #28a745;
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .btn-primary {
            background-color: #0041a3;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-weight: bold;
        }

        .btn-primary:hover {
            background-color: #002f6c;
        }

        canvas {
            background: #f1f4f9;
            border-radius: 8px;
            padding: 15px;
        }

        @media (max-width: 576px) {
            .container {
                padding: 20px 15px;
                margin-top: 20px;
            }
            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="container mt-5">

    <!-- Page Heading -->
    <h2 class="text-center mb-4"
        th:text="${election != null} ? 'Election Results - ' + election.name : 'Election Results'">
        Election Results
    </h2>

    <!-- Message Section -->
    <div th:if="${message}" class="alert alert-warning text-center">
        <span th:text="${message}"></span>
    </div>

    <!-- Results Section -->
    <div th:if="${results != null and !results.isEmpty()}">

        <!-- Blockchain Verification -->
        <div th:if="${chainValid != null}">
            <div th:if="${chainValid}" class="alert alert-success text-center">
                ✅ Blockchain valid. No tampering detected.
            </div>
            <div th:if="${!chainValid}" class="alert alert-danger text-center">
                ❌ Blockchain invalid! Data may have been tampered.
            </div>
        </div>

        <!-- Results Table -->
        <table class="table table-striped table-hover mt-4">
            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Candidate Name</th>
                <th>Party</th>
                <th>Total Votes</th>
                <th>Winner</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="candidate, iter : ${results}">
                <td th:text="${iter.index + 1}"></td>
                <td th:text="${candidate.name}"></td>
                <td th:text="${candidate.party}"></td>
                <td th:text="${candidate.voteCount}"></td>
                <td>
                    <span th:if="${iter.index == 0}" class="winner-badge">Winner</span>
                </td>
            </tr>
            </tbody>
        </table>

        <!-- Bar Chart -->
        <div class="mt-5">
            <canvas id="voteChart" height="100"></canvas>
        </div>

    </div>

    <!-- Back Button -->
    <div class="text-center mt-4">
        <a href="/voter/dashboard" class="btn btn-primary">Back to Dashboard</a>
    </div>

</div>

<!-- Chart.js Script -->
<script th:inline="javascript">
    /*<![CDATA[*/
        var resultsExist = /*[[${results != null and !results.isEmpty()}]]*/ false;
        if(resultsExist){
            var resultsList = /*[[${results}]]*/ [];
            var candidateNames = resultsList.map(c => c.name || '');
            var voteCounts = resultsList.map(c => c.voteCount || 0);
            var party = resultsList.map(c => c.party || 0);

            var ctx = document.getElementById('voteChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: candidateNames,
                    datasets: [{
                        label: 'Votes',
                        data: voteCounts,
                        backgroundColor: 'rgba(54, 162, 235, 0.7)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            precision: 0
                        }
                    }
                }
            });
        }
    /*]]>*/
</script>

</body>
</html>
