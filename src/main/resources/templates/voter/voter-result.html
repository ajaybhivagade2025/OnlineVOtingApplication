<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(to right, #f4f7fb, #dfe9f3);
        }

        .container {
            background-color: white;
            padding: 30px 25px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            margin-top: 50px;
            margin-bottom: 80px;
        }

        h2 {
            color: #0041a3;
            margin-bottom: 30px;
        }

        table th {
            background-color: #0041a3 !important;
            color: white !important;
            text-align: center;
        }

        table td {
            text-align: center;
            vertical-align: middle;
        }

        .winner-badge {
            background: linear-gradient(45deg, #28a745, #5cd65c);
            color: white;
            padding: 6px 10px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .winner-row {
            background-color: #d4edda !important;
            font-weight: bold;
        }

        .logo-img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #ccc;
        }

        canvas {
            background: #f1f4f9;
            border-radius: 8px;
            padding: 15px;
        }

        .back-btn-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .btn-primary {
            background-color: #0041a3;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">

    <h2 class="text-center">
        Election Results -
        <span th:text="${election.name}"></span>
    </h2>

    <!-- MESSAGE -->
    <div th:if="${message}" class="alert alert-warning text-center">
        <span th:text="${message}"></span>
    </div>

    <!-- RESULTS -->
    <div th:if="${results != null and !results.isEmpty()}">

        <!-- BLOCKCHAIN -->
        <div th:if="${chainValid != null}">
            <div th:if="${chainValid}" class="alert alert-success text-center">
                ✅ Blockchain valid
            </div>
            <div th:if="${!chainValid}" class="alert alert-danger text-center">
                ❌ Blockchain tampered
            </div>
        </div>

        <!-- TABLE -->
        <table class="table table-striped table-hover mt-4">
            <thead>
            <tr>
                <th>#</th>
                <th>Logo</th>
                <th>Name</th>
                <th>Party</th>
                <th>Votes</th>
                <th>Winner</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="candidate, iter : ${results}"
                th:classappend="${iter.index == 0} ? 'winner-row'">

                <td th:text="${iter.index + 1}"></td>

                <!-- LOGO -->
                <td>
                    <img th:if="${candidate.logo != null}"
                         th:src="@{'/uploads/' + ${candidate.logo}}"
                         class="logo-img">
                </td>

                <td th:text="${candidate.name}"></td>
                <td th:text="${candidate.party}"></td>
                <td th:text="${candidate.voteCount}"></td>

                <td>
                    <span th:if="${iter.index == 0}" class="winner-badge">
                        👑 Winner
                    </span>
                </td>

            </tr>
            </tbody>
        </table>

        <!-- CHART -->
        <div class="mt-5">
            <canvas id="voteChart"></canvas>
        </div>

    </div>
</div>

<!-- BACK BUTTON -->
<div class="back-btn-container">
    <a th:href="@{/voter/dashboard}" class="btn btn-primary">
        ← Back to Dashboard
    </a>
</div>

<!-- CHART SCRIPT -->
<script th:inline="javascript">
    /*<![CDATA[*/
    var resultsList = /*[[${results}]]*/ [];

    var names = resultsList.map(c => c.name);
    var votes = resultsList.map(c => c.voteCount);

    var colors = resultsList.map(c => {
        if(c.party === 'BJP') return '#ff9933';
        if(c.party === 'Congress') return '#19aaed';
        if(c.party === 'AAP') return '#00c853';
        return '#6c757d';
    });

    var ctx = document.getElementById('voteChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: names,
            datasets: [{
                label: 'Votes',
                data: votes,
                backgroundColor: colors
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
    /*]]>*/
</script>

</body>
</html>
