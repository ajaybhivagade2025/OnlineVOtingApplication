<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Voter Registration - Online Voting System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Full-page subtle gradient background */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom right, #f4f7fb, #dfe9f3);
        }

        /* Registration container */
        .container {
            background-color: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: #0041a3;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            transition: border 0.3s ease;
        }

        input:focus {
            border-color: #0041a3;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #0041a3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background-color: #002f6c;
        }

        p {
            margin-top: 20px;
            font-size: 14px;
        }

        p a {
            color: #0041a3;
            text-decoration: none;
            font-weight: bold;
        }

        p a:hover {
            text-decoration: underline;
        }

        /* Flash messages */
        .success, .error {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

    </style>
</head>
<body>
<div class="container">
    <h1>Voter Registration</h1>

    <div th:if="${error}" class="error" th:text="${error}"></div>
    <div th:if="${success}" class="success" th:text="${success}"></div>

    <form th:action="@{/voter/register}" method="post" th:object="${voter}">
        <div class="form-group">
            <label>National ID:</label>
            <input type="text" th:field="*{nationalId}" placeholder="Enter National ID" required>
        </div>
        <div class="form-group">
            <label>Full Name:</label>
            <input type="text" th:field="*{name}" placeholder="Enter your full name" required>
        </div>
        <div class="form-group">
            <label>Email:</label>
            <input type="email" th:field="*{email}" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
            <label>Mobile:</label>
            <input type="text" th:field="*{mobile}" placeholder="Enter mobile number" required>
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" th:field="*{password}" placeholder="Enter password" required>
        </div>
        <button type="submit">Register</button>
    </form>

    <p>Already registered? <a th:href="@{/voter/login}">Login here</a></p>
</div>
</body>
</html>
