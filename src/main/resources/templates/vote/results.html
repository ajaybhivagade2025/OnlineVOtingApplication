<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Election Results</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* Add similar styling as voting page */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        .results-table th, .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .results-table th {
            background: #007bff;
            color: white;
        }
        .winner {
            background: #d4edda !important;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📊 Election Results</h1>
        <p>Total Votes Cast: <span th:text="${totalVotes}">0</span></p>
    </div>

    <table class="results-table">
        <thead>
        <tr>
            <th>Rank</th>
            <th>Candidate</th>
            <th>Party</th>
            <th>Votes</th>
            <th>Percentage</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="candidate, status : ${candidates}"
            th:class="${status.first} ? 'winner' : ''">
            <td th:text="${status.index + 1}"></td>
            <td th:text="${candidate.name}"></td>
            <td th:text="${candidate.party}"></td>
            <td th:text="${candidate.voteCount}"></td>
            <td th:text="${totalVotes > 0 ? (#numbers.formatDecimal((candidate.voteCount / totalVotes) * 100, 1, 2) + '%') : '0%'}"></td>
        </tr>
        </tbody>
    </table>

    <div style="text-align: center; margin-top: 30px;">
        <a th:href="@{/voter/dashboard}" class="back-btn">← Back to Dashboard</a>
    </div>
</div>
</body>
</html>
